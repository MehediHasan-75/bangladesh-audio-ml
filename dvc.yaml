stages:
  collect:
    cmd: python scripts/collect_audio.py
    deps:
      - scripts/collect_audio.py
      - data/youtube_urls.csv
      - src/collectors/youtube_collector.py
      - src/processors/audio_processor.py
    outs:
      - ml_data/raw:
          cache: true
      - ml_data/download_metadata.json:
          cache: false
    metrics:
      - ml_data/processing_metadata.csv:
          cache: false

  process_physical:
    cmd: python scripts/process_physical.py
    deps:
      - scripts/process_physical.py
      - src/processors/physical_audio_processor.py
      - src/processors/media_handler.py
      - ml_data/physically_collected
    outs:
      - ml_data/processed:
          cache: true
    metrics:
      - ml_data/physical_processing_metadata.csv:
          cache: false

  quality_check:
    cmd: python -c "from src.quality.quality_controller import QualityController; QualityController().verify_all()"
    deps:
      - src/quality/quality_controller.py
      - ml_data/processed
    metrics:
      - ml_data/quality_report.csv:
          cache: false
